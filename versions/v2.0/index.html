<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潇龙霞八字黄历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0 30px;
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #d4af37, #f4e5c2, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        .input-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(212,175,55,0.2);
        }
        
        .section-title {
            color: #d4af37;
            font-size: 1.2em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #d4af37, #b8941d);
            border-radius: 2px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: bold;
            font-size: 0.95em;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #e4e4e4;
            font-size: 16px;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212,175,55,0.3);
        }
        
        .datetime-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        
        .gender-row {
            display: flex;
            gap: 30px;
        }
        
        .gender-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 8px 16px;
            background: rgba(212,175,55,0.1);
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .gender-option:hover {
            background: rgba(212,175,55,0.2);
        }
        
        .gender-option input[type="radio"] {
            width: auto;
            margin-right: 8px;
        }
        
        .gender-option.selected {
            background: rgba(212,175,55,0.3);
            border: 1px solid #d4af37;
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #d4af37, #b8941d, #d4af37);
            background-size: 200% 200%;
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(212,175,55,0.5);
        }
        
        .result-section {
            display: none;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(212,175,55,0.2);
        }
        
        .sizhu-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .sizhu-table th {
            background: linear-gradient(180deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1));
            padding: 15px;
            text-align: center;
            color: #d4af37;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .sizhu-table td {
            padding: 20px 15px;
            text-align: center;
            border: 1px solid rgba(212,175,55,0.1);
        }
        
        .pillar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .gan, .zhi {
            font-size: 2em;
            font-weight: bold;
        }
        
        .gan { color: #f4e5c2; }
        .zhi { color: #e4e4e4; }
        
        .wuxing-tag {
            font-size: 0.85em;
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
        }
        
        .wuxing-jin { background: linear-gradient(135deg, rgba(255,215,0,0.4), rgba(255,215,0,0.2)); color: #ffd700; }
        .wuxing-mu { background: linear-gradient(135deg, rgba(0,255,0,0.4), rgba(0,255,0,0.2)); color: #90ee90; }
        .wuxing-shui { background: linear-gradient(135deg, rgba(0,191,255,0.4), rgba(0,191,255,0.2)); color: #87ceeb; }
        .wuxing-huo { background: linear-gradient(135deg, rgba(255,69,0,0.4), rgba(255,69,0,0.2)); color: #ff6347; }
        .wuxing-tu { background: linear-gradient(135deg, rgba(139,69,19,0.4), rgba(139,69,19,0.2)); color: #deb887; }
        
        .dayun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .yun-card {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #d4af37;
        }
        
        .yun-card h4 {
            color: #d4af37;
            margin-bottom: 12px;
            font-size: 1em;
        }
        
        .yi-ji-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }
        
        .yi-box, .ji-box {
            padding: 20px;
            border-radius: 12px;
        }
        
        .yi-box {
            background: linear-gradient(135deg, rgba(0,255,0,0.1), rgba(0,255,0,0.05));
            border: 1px solid rgba(0,255,0,0.3);
        }
        
        .ji-box {
            background: linear-gradient(135deg, rgba(255,0,0,0.1), rgba(255,0,0,0.05));
            border: 1px solid rgba(255,0,0,0.3);
        }
        
        .yi-box h4 {
            color: #90ee90;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .ji-box h4 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .tag {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95em;
        }
        
        .yi-box .tag {
            background: rgba(0,255,0,0.15);
            color: #90ee90;
        }
        
        .ji-box .tag {
            background: rgba(255,0,0,0.15);
            color: #ff9999;
        }
        
        .advice-box {
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }
        
        .advice-box h4 {
            color: #d4af37;
            margin-bottom: 15px;
        }
        
        .advice-text {
            line-height: 1.8;
            color: #e4e4e4;
        }
        
        .shishen-flow {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
        }
        
        .shishen-item {
            text-align: center;
            padding: 15px;
            background: rgba(212,175,55,0.1);
            border-radius: 10px;
            min-width: 80px;
        }
        
        .shishen-name {
            font-size: 1.1em;
            color: #f4e5c2;
            margin-bottom: 5px;
        }
        
        .shishen-gan {
            font-size: 1.5em;
            font-weight: bold;
            color: #d4af37;
        }
        
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 0.9em;
        }
        
        .footer a {
            color: #d4af37;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>潇龙霞八字黄历</h1>
            <p class="subtitle">八字命理 · 日运吉凶 · 黄历宜忌</p>
        </header>
        
        <!-- 出生信息 -->
        <div class="input-section">
            <div class="section-title">出生信息</div>
            
            <div class="form-group">
                <label>出生日期（阳历）</label>
                <div class="datetime-row">
                    <select id="birthYear"><option value="">年</option></select>
                    <select id="birthMonth"><option value="">月</option></select>
                    <select id="birthDay"><option value="">日</option></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>出生时间</label>
                <div class="datetime-row">
                    <select id="birthHour"><option value="">时</option></select>
                    <select id="birthMinute"><option value="0">分</option></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>性别</label>
                <div class="gender-row">
                    <label class="gender-option selected">
                        <input type="radio" name="gender" value="male" checked>
                        <span>男</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="female">
                        <span>女</span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- 测算信息 -->
        <div class="input-section">
            <div class="section-title">测算日期</div>
            
            <div class="form-group">
                <label>要测算的日期</label>
                <div class="datetime-row">
                    <select id="targetYear"><option value="">年</option></select>
                    <select id="targetMonth"><option value="">月</option></select>
                    <select id="targetDay"><option value="">日</option></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>所在城市（用于时辰校准，可选）</label>
                <input type="text" id="location" placeholder="如：北京、上海、广州..." value="北京">
            </div>
        </div>
        
        <button onclick="calculateAll()">开始测算</button>
        
        <!-- 结果区域 -->
        <div class="result-section" id="result">
            
            <!-- 八字命盘 -->
            <div class="result-card">
                <div class="section-title">八字命盘</div>
                <table class="sizhu-table">
                    <tr>
                        <th>年柱</th>
                        <th>月柱</th>
                        <th>日柱</th>
                        <th>时柱</th>
                    </tr>
                    <tr id="sizhuRow"></tr>
                </table>
                
                <div class="shishen-flow" id="shishenFlow"></div>
            </div>
            
            <!-- 测算日期信息 -->
            <div class="result-card">
                <div class="section-title">测算日期八字</div>
                <div id="targetDateInfo" style="text-align: center; padding: 20px;"></div>
            </div>
            
            <!-- 日运分析 -->
            <div class="result-card">
                <div class="section-title">今日运势分析</div>
                <div class="dayun-grid" id="dayunGrid"></div>
            </div>
            
            <!-- 黄历宜忌 -->
            <div class="result-card">
                <div class="section-title">黄历宜忌</div>
                
                <div class="yi-ji-grid">
                    <div class="yi-box">
                        <h4>✅ 宜（适合做的事）</h4>
                        <div class="tag-list" id="yiList"></div>
                    </div>
                    
                    <div class="ji-box">
                        <h4>❌ 忌（避免做的事）</h4>
                        <div class="tag-list" id="jiList"></div>
                    </div>
                </div>
            </div>
            
            <!-- 具体建议 -->
            <div class="result-card">
                <div class="section-title">今日建议</div>
                <div class="advice-box">
                    <div class="advice-text" id="adviceText"></div>
                </div>
            </div>
            
        </div>
        
        <div class="footer">
            <p>第二阶段 · 八字黄历 v2.0</p>
            <p><a href="https://github.com/ssjjpp-tz/simacount" target="_blank">Powered by 潇龙霞</a></p>
        </div>
    </div>
    
    <script src="bazi-v2.js"></script>
</body>
</html>
