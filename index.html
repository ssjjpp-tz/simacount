<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潇龙霞八字计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e4;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #d4af37, #f4e5c2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
        }
        
        .input-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(212,175,55,0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #d4af37;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #e4e4e4;
            font-size: 16px;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        
        .datetime-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }
        
        .gender-row {
            display: flex;
            gap: 20px;
        }
        
        .gender-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .gender-option input[type="radio"] {
            width: auto;
            margin-right: 8px;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #d4af37, #b8941d);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212,175,55,0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(212,175,55,0.2);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .sizhu-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .sizhu-table th {
            background: rgba(212,175,55,0.2);
            padding: 15px;
            text-align: center;
            color: #d4af37;
            font-weight: bold;
        }
        
        .sizhu-table td {
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(212,175,55,0.1);
        }
        
        .pillar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .gan {
            font-size: 1.8em;
            font-weight: bold;
            color: #f4e5c2;
        }
        
        .zhi {
            font-size: 1.8em;
            font-weight: bold;
            color: #e4e4e4;
        }
        
        .wuxing-tag {
            font-size: 0.9em;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
        }
        
        .wuxing-jin { background: rgba(255,215,0,0.3); color: #ffd700; }
        .wuxing-mu { background: rgba(0,255,0,0.3); color: #90ee90; }
        .wuxing-shui { background: rgba(0,191,255,0.3); color: #87ceeb; }
        .wuxing-huo { background: rgba(255,69,0,0.3); color: #ff6347; }
        .wuxing-tu { background: rgba(139,69,19,0.3); color: #deb887; }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .info-card {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            border-left: 3px solid #d4af37;
        }
        
        .info-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 1em;
        }
        
        .shishen-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .shishen-tag {
            background: rgba(212,175,55,0.15);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9em;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.9em;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>潇龙霞八字计算器</h1>
            <p class="subtitle">传统命理 · 智能计算</p>
        </header>
        
        <div class="input-section">
            <div class="form-group">
                <label>出生日期（阳历）</label>
                <div class="datetime-row">
                    <select id="year">
                        <option value="">年</option>
                    </select>
                    <select id="month">
                        <option value="">月</option>
                    </select>
                    <select id="day">
                        <option value="">日</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>出生时间</label>
                <div class="datetime-row">
                    <select id="hour">
                        <option value="">时</option>
                    </select>
                    <select id="minute">
                        <option value="">分（可选）</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>性别</label>
                <div class="gender-row">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="male" checked>
                        <span>男</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="female">
                        <span>女</span>
                    </label>
                </div>
            </div>
            
            <button onclick="calculateBazi()">开始测算</button>
        </div>
        
        <div class="result-section" id="result">
            <h2 style="text-align: center; color: #d4af37; margin-bottom: 20px;">八字命盘</h2>
            
            <table class="sizhu-table">
                <tr>
                    <th>年柱</th>
                    <th>月柱</th>
                    <th>日柱</th>
                    <th>时柱</th>
                </tr>
                <tr id="sizhu-row">
                </tr>
            </table>
            
            <div class="info-grid">
                <div class="info-card">
                    <h3>日主</h3>
                    <p id="day-master"></p>
                </div>
                <div class="info-card">
                    <h3>五行统计</h3>
                    <p id="wuxing-count"></p>
                </div>
                <div class="info-card">
                    <h3>十神</h3>
                    <div class="shishen-list" id="shishen-list"></div>
                </div>
                <div class="info-card">
                    <h3>纳音</h3>
                    <p id="nayin"></p>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>第一阶段 · 纯前端八字计算</p>
            <p> powered by 潇龙霞</p>
        </div>
    </div>
    
    <script src="bazi.js"></script>
</body>
</html>
